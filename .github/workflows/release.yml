name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            platform: win
            build_args: --win nsis
            artifact_name: windows
          - name: linux
            os: ubuntu-latest
            platform: linux
            build_args: --linux AppImage
            artifact_name: linux
          - name: macos
            os: macos-latest
            platform: mac
            build_args: --mac dmg
            artifact_name: macos

    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Apple certificate
        if: matrix.platform == 'mac'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          if [ -z "${BUILD_CERTIFICATE_BASE64:-}" ]; then
            echo "No BUILD_CERTIFICATE_BASE64 secret; macOS build will be unsigned."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 -d > $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript and renderer assets
        run: |
          npm run prebuild
          npx tsc

      - name: Package
        run: npx electron-builder ${{ matrix.build_args }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iacula-${{ matrix.artifact_name }}
          path: release/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: iacula-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate landing manifest
        id: generate-landing-manifest
        run: |
          node scripts/generate-landing-manifest.js \
            --artifacts-dir release-artifacts \
            --output web/landing/public/manifest.json \
            --version "${{ github.ref_name }}" \
            --fallback-url "https://github.com/gabrielttavares/iacula/releases"

      - name: Upload landing manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: landing-manifest
          path: web/landing/public/manifest.json
          if-no-files-found: error
          retention-days: 7

      - name: Commit manifest to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/landing/public/manifest.json
          git diff --cached --quiet && echo "No manifest changes" && exit 0
          git commit -m "chore(landing): update download manifest for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/*.exe
            release-artifacts/*.exe.blockmap
            release-artifacts/*.AppImage
            release-artifacts/*.dmg
            release-artifacts/*.dmg.blockmap
            release-artifacts/latest.yml
            release-artifacts/latest-linux.yml
            release-artifacts/latest-mac.yml
          fail_on_unmatched_files: false
